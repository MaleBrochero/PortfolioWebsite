<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Gallery - Maria Jose</title>
    <!-- Connect CSS file here -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">Maria Jose</div>
        <button class="hamburger" id="hamburger">☰</button>
        <ul id="nav-links">
            <li><a href="index.html#inicio">Inicio</a></li>
            <li><a href="index.html#perfil">Perfil</a></li>
            <li><a href="index.html#proyectos">Proyectos</a></li>
            <li><a href="mascotas.html">Galería de Mascotas</a></li>
        </ul>
    </nav>

    <!-- Main Container -->
    <main class="container">
        <h2>Galería de Mascotas</h2>
        
        <!-- Flexbox Gallery Section -->
        <section class="pet-gallery-flex">
            <h3>Flexbox Layout</h3>
            <div class="flex-container">
                <img src="https://placedog.net/300/300?id=10" alt="Dog 1">
                <img src="https://placedog.net/300/300?id=20" alt="Dog 2">
                <img src="https://placedog.net/300/300?id=30" alt="Dog 3">
                <img src="https://placedog.net/300/300?id=40" alt="Dog 4">
                <img src="https://placedog.net/300/300?id=50" alt="Dog 5">
                <img src="https://placedog.net/300/300?id=60" alt="Dog 6">
            </div>
        </section>

        <!-- Grid Gallery Section -->
        <section class="pet-gallery-grid" style="margin-top: 3rem;">
            <h3>Grid Layout</h3>
            <div class="grid-container">
                <img src="https://placedog.net/300/300?id=70" alt="Animal 1">
                <img src="https://placedog.net/300/300?id=80" alt="Animal 2">
                <img src="https://placedog.net/300/300?id=90" alt="Animal 3">
                <img src="https://placedog.net/300/300?id=100" alt="Animal 4">
                <img src="https://placedog.net/300/300?id=110" alt="Animal 5">
                <img src="https://placedog.net/300/300?id=120" alt="Animal 6">
            </div>
        </section>
    </main>

    <!-- Connect JS file here -->
    <script src="script.js"></script>
</body>
</html>
